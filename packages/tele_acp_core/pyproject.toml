[project]
name = "tele-acp-core"
version = "0.1.0"
description = "Core types for tele-acp"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.12.5",
]

[build-system]
requires = ["uv_build>=0.9.28,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = ["tele_acp_core"]
